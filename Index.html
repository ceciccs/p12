<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Cecilia Castaño</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Gothic&display=swap" rel="stylesheet">

    <style>
        :root {
            --size-modul: 20px; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
            color: #ff00ff;
            font-family: "League Gothic", sans-serif;
            background-color: black;
        }
        
        .titulo-header {
            font-weight: 400; 
            font-size: 4.5em; 
            text-transform: uppercase;
            letter-spacing: 2px; 
            line-height: 1; 
        }
        #un {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        #dos {
            position: relative;
            width: 50%;
            height: 100%;
            padding: var(--size-modul);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: var(--size-modul);
            justify-items: center;
            align-items: center;
        }
        
        header {
            width: 100%;
            height: 50%;
            padding: 20px;
            text-align: right; 
            display: flex;       
            flex-direction: column;
            justify-content: flex-start;
        }

        main {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 50%;
        }
        #autor, #estudi {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            justify-content: flex-end; 
        }
        .botones {
            font-size: 3.5vw; 
            text-transform: uppercase;
            text-decoration: none;
            color: #ff00ff;
            letter-spacing: 1px;

            display: flex;
            justify-content: center;
            align-items: center;
            
            width: 100%;
            height: 100%;
            aspect-ratio: 1 / 1;
            
            max-width: 100%;
            max-height: 100%;

            border: 2px solid #ff00ff;
            border-radius: 50%;
            
            position: relative; 
        }

        @media only screen and (max-width: 375px) {
            .container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                overflow-y: auto; 
            }
            #un {
                width: 100%;
                height: auto;
                min-height: 40vh; 
            }
            #dos {
                width: 100%;
                height: auto;
                padding: var(--size-modul); 
            }
            .botones {
                font-size: 2em; 
            }
            .titulo-header {
                font-size: 3em; 
                line-height: 1.1;
            }
        }
    </style>
</head>

<div class="container">
    
    <div id="dos">
        <a href="https://ceciccs.github.io/p1/" class="botones">p1</a>
        <a href="https://ceciccs.github.io/p2/" class="botones">p2</a>
        <a href="https://ceciccs.github.io/p3/" class="botones">p3</a>
        <a href="https://ceciccs.github.io/p4/" class="botones">p4</a>

        <a href="https://ceciccs.github.io/p5_2/" class="botones">p5</a>
        <a href="https://ceciccs.github.io/p6/" class="botones">p6</a>
        <a href="https://www.figma.com/design/twNZs8NZWQN5VlPAnI7iBT/p7?node-id=0-1&t=Z3awi8HB9KS1wQrO-1" class="botones">p7</a>
        <a href="img/processing_ceci.jpeg" class="botones">p8</a>

        <a href="https://ceciccs.github.io/p9/" class="botones">p9</a>
        <a href="https://www.figma.com/design/O91bC3uo3KsUL755RE6vzU/Formageda?node-id=0-1&t=c8MbDbxchOG1kSUh-1" class="botones">p10</a>
        <a href="https://www.figma.com/design/VBLPL96Smj45JAeiZERgmt/p11?node-id=0-1&t=F9HCy53g7Tt7GgUI-1" class="botones">p11</a>
        
        <div class="botones"></div>
    </div>    
    
    <div id="un">
        <header>
            <h1 class="titulo-header">portfolio</h1>
        </header>
        <main>
            <div id="autor">
                <h2 class="titulo-header">Cecilia Castaño</h2>
            </div>
            <div id="estudi">
                <h2 class="titulo-header">Fotografía y Diseño</h2>
                <br> 
                <h2 class="titulo-header">2026</h2>
            </div>
        </main>
    </div>
</div>

</html>
